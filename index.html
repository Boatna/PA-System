<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0804">
    <meta name="description" content="ระบบประกาศเสียงอัตโนมัติ - Voice Alarm Pro">
    <title>Voice Alarm Pro</title>

    <!-- Fonts loaded once via <link> — @import removed from CSS to avoid double-load -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Background Layers -->
    <div class="bg-layer" aria-hidden="true">
        <div class="bg-grid"></div>
        <div class="bg-glow glow-1"></div>
        <div class="bg-glow glow-2"></div>
    </div>

    <!-- Header: implicit role="banner" — no need to declare -->
    <header>
        <div class="header-left">
            <div class="logo-mark" aria-hidden="true">
                <span class="logo-bar"></span>
                <span class="logo-bar"></span>
                <span class="logo-bar"></span>
            </div>
            <div class="header-brand">
                <h1 class="brand-title">VOICE ALARM<span class="brand-pro">PRO</span></h1>
                <div class="subtitle">ระบบประกาศเสียงอัตโนมัติ</div>
            </div>
        </div>

        <div class="header-center">
            <time class="digital-clock" id="clock" aria-live="off">00:00:00</time>
            <div class="digital-date" id="date" aria-live="off">Loading...</div>
        </div>

        <div class="header-right">
            <div class="status-badge" id="statusBadge" role="status" aria-live="polite">
                <span class="status-dot" aria-hidden="true"></span>
                <span id="statusText">STANDBY</span>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="main-container">

        <!-- aside: implicit role="complementary" — no need to declare -->
        <aside class="control-panel" aria-label="แผงควบคุม">

            <div class="panel-label">CONTROL</div>

            <button id="powerBtn"
                    class="btn-power"
                    onclick="toggleSystem()"
                    aria-label="เปิด/ปิดระบบ"
                    aria-pressed="false">
                <span class="power-ring" aria-hidden="true"></span>
                <i class="fas fa-power-off" aria-hidden="true"></i>
                <span id="powerText">START SYSTEM</span>
            </button>

            <div class="stats-grid" role="status" aria-label="สถิติระบบ">
                <div class="stat-card">
                    <span class="stat-label">รายการทั้งหมด</span>
                    <span class="stat-value" id="scheduleCount">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">เปิดใช้งาน</span>
                    <span class="stat-value active" id="enabledCount">0</span>
                </div>
            </div>

            <div class="volume-panel">
                <div class="volume-row">
                    <!-- <label> wrapping the text properly associates it with the input -->
                    <label class="volume-label" for="volumeSlider">
                        <i class="fas fa-volume-up" aria-hidden="true"></i> ระดับเสียง
                    </label>
                    <span class="volume-value" id="volText" aria-live="polite">100%</span>
                </div>
                <div class="range-track">
                    <input type="range"
                           id="volumeSlider"
                           min="0" max="1" step="0.01" value="1"
                           oninput="handleVolumeChange(this.value)">
                </div>
            </div>

            <div class="rule" role="separator" aria-hidden="true"></div>

            <div class="manual-section">
                <div class="panel-label">MANUAL PLAY</div>
                <div id="manualBoard"
                     class="manual-list"
                     role="group"
                     aria-label="เล่นเสียงด้วยตนเอง"></div>
            </div>

        </aside>

        <!-- main: implicit role="main" — no need to declare -->
        <main class="schedule-panel">

            <div class="panel-top">
                <div class="next-event-box" role="status" aria-live="polite" aria-label="กิจกรรมถัดไป">
                    <div class="next-label" aria-hidden="true">NEXT EVENT</div>
                    <div class="next-value" id="nextSchedule">--:--</div>
                    <div class="next-countdown" id="nextCountdown">No active schedules</div>
                </div>

                <!-- aria-label added -->
                <div class="action-bar" role="toolbar" aria-label="จัดการรายการตารางเวลา">
                    <button class="btn-add"
                            onclick="addSchedule()"
                            aria-label="เพิ่มรายการใหม่">
                        <i class="fas fa-plus" aria-hidden="true"></i> เพิ่มรายการ
                    </button>
                    <div class="icon-group" role="group" aria-label="ตัวเลือกข้อมูล">
                        <button class="btn-tool"
                                onclick="exportData()"
                                title="สำรองข้อมูล"
                                aria-label="สำรองข้อมูล">
                            <i class="fas fa-download" aria-hidden="true"></i>
                        </button>
                        <button class="btn-tool"
                                onclick="triggerImport()"
                                title="กู้คืนข้อมูล"
                                aria-label="กู้คืนข้อมูล">
                            <i class="fas fa-upload" aria-hidden="true"></i>
                        </button>
                        <button class="btn-tool danger"
                                onclick="confirmReset()"
                                title="ล้างข้อมูลทั้งหมด"
                                aria-label="ล้างข้อมูลทั้งหมด">
                            <i class="fas fa-trash-alt" aria-hidden="true"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div id="scheduleContainer"
                 class="schedule-list"
                 role="list"
                 aria-label="รายการตารางเวลา"></div>

        </main>
    </div>

    <!-- Modal: tabindex="-1" enables programmatic focus for focus-trap -->
    <div id="confirmModal"
         class="modal-overlay"
         role="dialog"
         aria-modal="true"
         aria-labelledby="modalTitle"
         aria-describedby="modalMessage"
         tabindex="-1">
        <div class="modal-box">
            <div class="modal-icon-wrap" aria-hidden="true">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h3 id="modalTitle">Confirm Action</h3>
            <p id="modalMessage">Are you sure?</p>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">ยกเลิก</button>
                <button class="btn-confirm" id="modalConfirmBtn">ยืนยัน</button>
            </div>
        </div>
    </div>

    <!-- Hidden / Non-visual elements -->
    <audio id="mainAudioPlayer" preload="metadata" playsinline webkit-playsinline aria-hidden="true"></audio>
    <input type="file" id="importFile" accept=".json,application/json" style="display:none" aria-hidden="true" tabindex="-1">

    <script src="script.js"></script>

    <noscript>
        <div style="position:fixed;inset:0;background:#0a0804;color:#f0e6d0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;z-index:9999;text-align:center;padding:2rem;">
            <i class="fas fa-exclamation-triangle" style="font-size:3rem;color:#f5a623;" aria-hidden="true"></i>
            <h1>JavaScript Required</h1>
            <p>Voice Alarm Pro ต้องการ JavaScript เพื่อทำงาน<br>กรุณาเปิดใช้งาน JavaScript ในเบราว์เซอร์</p>
        </div>
    </noscript>
</body>
</html>
